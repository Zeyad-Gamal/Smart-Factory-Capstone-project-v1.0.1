apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: soc-ingress
  namespace: soc
spec:
  ingressClassName: nginx
  rules:
    - host: soc.factory.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: soc-service
                port:
                  number: 5000
namespaces:
  app: scada-system
  soc: soc

frontend:
  replicaCount: 4
  image: digigrad/scada-frontend:v8
  strategy:
      maxSurge: 1
      maxUnavailable: 1
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  ingress:
    enabled: true
    host: scada.com

backend:
  replicaCount: 4
  image: digigrad/factory-backend:v4
  strategy:
    maxSurge: 1
    maxUnavailable: 1
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

mysql:
  image: digigrad/mysql:v3
  storage: 2Gi
  database: scada_db
  user: scada_user
  service:
    port: 3306

secrets:
  mysqlRootPassword: Root@123
  mysqlPassword: StrongPass123!
  appKey: "base64:VYkot/f8qaPncPVEFu4n/RQMloQNxLn1E7ofeO1Ca/s="
  Openai_Api_Key: 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

config:
  APP_NAME: Laravel
  APP_ENV: local
  APP_DEBUG: "true"
  APP_URL: http://localhost
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"

hpa:
  backend:
    minReplicas: 3
    maxReplicas: 10
    targetCPU: 70

  frontend:
    minReplicas: 3
    maxReplicas: 10
    targetCPU: 70

networkPolicy:
  enabled: true


soc:
  enabled: true

  ingress:
    enabled: true
    host: soc.com

  service:
    type: ClusterIP
    port: 5000

  replicaCount: 2

  image:
    repository: digigrad/soc
    tag: v1

  model: llama3.2

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

agent:
  enabled: true

  replicaCount: 1

  image:
    repository: digigrad/ai-agent
    tag: v4

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

